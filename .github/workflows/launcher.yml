name: CloudSurf Runner

on:
  schedule:
    - cron: '*/1 * * * *'        # Every minute
    # - cron: '*/10 2-8 * * *'    # Every 10min between 2am–8am UTC
    # - cron: '*/10 14-16 * * *'  # Every 10min between 2pm–4pm UTC
  
  workflow_dispatch:              # Allow manual trigger

jobs:
  launch:
    runs-on: ubuntu-latest
    
    # Required permissions for Codespaces
    permissions:
      contents: read
      codespaces: write

    steps:
      - name: Start CloudSurf Codespace
        run: |
          CODESPACE="${{ vars.CLOUDSURF_CODESPACE_NAME }}"
          
          if [ -z "$CODESPACE" ]; then
            echo "❌ No codespace name set! Please add CLOUDSURF_CODESPACE_NAME in Repository Variables."
            exit 1
          fi

          echo "🔍 Checking codespace: $CODESPACE"
          
          # Get current state
          STATE=$(gh codespace list --repo ${{ github.repository }} \
            --json name,state \
            -q '.[] | select(.name == "'$CODESPACE'") | .state' || echo "")

          echo "Current state: ${STATE:-Not found}"
          
          if [ "$STATE" = "Available" ]; then
            echo "✅ Codespace is already running. Nothing to do."
          else
            echo "🚀 Starting codespace (this can take 30-90 seconds)..."
            gh codespace code --codespace "$CODESPACE" --web > /dev/null 2>&1 || true
            echo "✅ Start command sent successfully!"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
